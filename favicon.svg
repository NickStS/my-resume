<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="4" fill="#0c0c0c"/>
  <!-- arms -->
  <line x1="16" y1="16" x2="8"  y2="8"  stroke="#fb6d3a" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="16" y1="16" x2="24" y2="8"  stroke="#fb6d3a" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="16" y1="16" x2="8"  y2="24" stroke="#fb6d3a" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="16" y1="16" x2="24" y2="24" stroke="#fb6d3a" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <!-- propellers -->
  <circle cx="8"  cy="8"  r="4" fill="none" stroke="#fb6d3a" stroke-width="1.5"/>
  <circle cx="24" cy="8"  r="4" fill="none" stroke="#fb6d3a" stroke-width="1.5"/>
  <circle cx="8"  cy="24" r="4" fill="none" stroke="#fb6d3a" stroke-width="1.5"/>
  <circle cx="24" cy="24" r="4" fill="none" stroke="#fb6d3a" stroke-width="1.5"/>
  <!-- body -->
  <rect x="13" y="13" width="6" height="6" rx="1" fill="#fb6d3a"/>
</svg>
